apiVersion: apps/v1
kind: Deployment
metadata:
  name: dash
  namespace: algo
  labels:
    app: dash
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dash
  template:
    metadata:
      labels:
        app: dash
    spec:
      imagePullSecrets:
        - name: aliyun-registry-secret
      containers:
        - name: dash
          image: dash:latest
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: Asia/Shanghai
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: dash-config
---
apiVersion: v1
kind: Service
metadata:
  name: dash
  namespace: algo
spec:
  selector:
    app: dash
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
